name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: lastmile-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: lastmile-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: lastmile-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: lastmile-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/lastmile-darwin-arm64/lastmile-darwin-arm64 release/
          mv artifacts/lastmile-darwin-x64/lastmile-darwin-x64 release/
          mv artifacts/lastmile-linux-x64/lastmile-linux-x64 release/
          mv artifacts/lastmile-windows-x64.exe/lastmile-windows-x64.exe release/
          chmod +x release/lastmile-*
          cd release
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/lastmile-darwin-arm64
            release/lastmile-darwin-x64
            release/lastmile-linux-x64
            release/lastmile-windows-x64.exe
            release/checksums.txt
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_DARWIN_ARM64=$(sha256sum release/lastmile-darwin-arm64 | cut -d ' ' -f 1)
          SHA_DARWIN_X64=$(sha256sum release/lastmile-darwin-x64 | cut -d ' ' -f 1)
          SHA_LINUX_X64=$(sha256sum release/lastmile-linux-x64 | cut -d ' ' -f 1)

          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew/lastmile.rb
          sed -i "s/REPLACE_WITH_SHA256_DARWIN_ARM64/$SHA_DARWIN_ARM64/" homebrew/lastmile.rb
          sed -i "s/REPLACE_WITH_SHA256_DARWIN_X64/$SHA_DARWIN_X64/" homebrew/lastmile.rb
          sed -i "s/REPLACE_WITH_SHA256_LINUX_X64/$SHA_LINUX_X64/" homebrew/lastmile.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/lastmile.rb
          git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main
